version: '3.8'

services:
  resologix:
    build: .
    container_name: resologix
    ports:
      - "3000:3000"
    volumes:
      # Mount the entire data directory so SQLite WAL files and the DB persist properly
      - ./data:/app/data
    environment:
      # Required for NextAuth security
      - NEXTAUTH_SECRET=your_super_secret_key_change_me
      # Point this to your Synology's local IP (e.g. http://192.168.1.100:3000)
      - NEXTAUTH_URL=http://localhost:3000
    restart: unless-stopped
