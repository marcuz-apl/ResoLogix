services:
  resologix:
    build: .
    container_name: resologix
    ports:
      - "3010:3010"
    volumes:
      # Mount the entire data directory so SQLite WAL files and the DB persist properly
      - ./data:/app/data
      # Mount reports directory for persistent external storage if needed
      - ./reports:/app/reports
    environment:
      # Required for NextAuth security
      - NEXTAUTH_SECRET=your_super_secret_key_change_me
      # Point this to your Synology's local IP (e.g. http://192.168.1.100:3010)
      - NEXTAUTH_URL=http://localhost:3010
    restart: unless-stopped
